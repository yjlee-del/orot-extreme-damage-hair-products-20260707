<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>국내 극손상모 헤어케어 상품 리서치</title>
  <style>
    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --surface-muted: #f2f4f6;
      --line: #e5e8eb;
      --line-strong: #d8d8dd;
      --text-strong: #19191a;
      --text-normal: #303033;
      --text-neutral: #757582;
      --text-subtle: #a4a4af;
      --primary: #19191a;
      --link: #2563eb;
      --sale: #ff4800;
      --success: #16a34a;
      --warning-bg: #fef9c3;
      --warning-text: #854d0e;
      --danger-bg: #fff3f0;
      --danger-text: #b91c1c;
      --radius-s: 4px;
      --radius-m: 8px;
      --radius-l: 12px;
      --shadow-pop: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    html {
      font-family: Pretendard, "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      word-break: keep-all;
      color: var(--text-normal);
      background: var(--bg);
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-width: 1180px;
      overflow-x: hidden;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .top-inner {
      max-width: 1680px;
      margin: 0 auto;
      padding: 24px 30px 20px;
    }

    .eyebrow {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--text-neutral);
      font-size: 13px;
      line-height: 18px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      color: var(--text-strong);
      font-size: 28px;
      line-height: 39px;
      font-weight: 800;
      text-wrap: balance;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--text-neutral);
      font-size: 14px;
      line-height: 20px;
      text-wrap: pretty;
    }

    .summary {
      max-width: 1680px;
      margin: 0 auto;
      padding: 18px 30px 10px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-m);
      padding: 16px;
    }

    .metric span {
      display: block;
      color: var(--text-neutral);
      font-size: 12px;
      line-height: 17px;
      margin-bottom: 6px;
    }

    .metric strong {
      color: var(--text-strong);
      font-size: 22px;
      line-height: 31px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      max-width: 1680px;
      margin: 0 auto;
      padding: 8px 30px 16px;
      display: grid;
      grid-template-columns: 1fr auto auto auto auto auto auto;
      gap: 10px;
      align-items: center;
    }

    .search {
      height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-m);
      background: var(--surface);
      padding: 0 12px;
      color: var(--text-strong);
      outline: none;
    }

    .search:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.16);
    }

    .select {
      height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-m);
      background: var(--surface);
      padding: 0 32px 0 12px;
      color: var(--text-strong);
    }

    .btn {
      height: 40px;
      border: 0;
      border-radius: var(--radius-m);
      background: var(--primary);
      color: #fff;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.secondary {
      border: 1px solid var(--line-strong);
      background: var(--surface);
      color: var(--text-normal);
    }

    .content {
      max-width: 1680px;
      margin: 0 auto;
      width: 100%;
      padding: 0 30px 40px;
      min-width: 0;
      overflow-x: hidden;
    }

    .table-wrap {
      display: block;
      width: 100%;
      max-width: 100%;
      max-height: calc(100vh - 272px);
      border: 1px solid var(--line);
      border-radius: var(--radius-m);
      background: var(--surface);
      overflow: auto;
      overscroll-behavior: contain;
    }

    table {
      width: 100%;
      min-width: 1980px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--surface-muted);
      color: var(--text-strong);
      border-bottom: 1px solid var(--line-strong);
      border-right: 1px solid var(--line);
      padding: 10px 10px;
      font-size: 12px;
      line-height: 17px;
      font-weight: 800;
      text-align: left;
      vertical-align: bottom;
    }

    thead th:first-child,
    thead th:nth-child(2) {
      z-index: 8;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    th.sortable::after {
      content: "↕";
      margin-left: 6px;
      color: var(--text-subtle);
      font-weight: 700;
    }

    th.sortable.active.asc::after { content: "↑"; color: var(--text-strong); }
    th.sortable.active.desc::after { content: "↓"; color: var(--text-strong); }

    th.draggable-col {
      cursor: grab;
    }

    th.draggable-col:active {
      cursor: grabbing;
    }

    th.dragging {
      opacity: 0.55;
    }

    th.drop-target {
      box-shadow: inset 3px 0 0 var(--link), 1px 0 0 var(--line);
    }

    tbody td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 12px 10px;
      font-size: 13px;
      line-height: 19px;
      vertical-align: top;
      background: var(--surface);
      text-wrap: pretty;
    }

    tbody tr:hover td {
      background: #fcfcfd;
    }

    thead th:first-child,
    tbody td:first-child {
      position: sticky;
      left: 0;
      z-index: 4;
      background: var(--surface);
      box-shadow: 1px 0 0 var(--line);
    }

    thead th:first-child {
      z-index: 9;
      background: var(--surface-muted);
    }

    thead th:nth-child(2),
    tbody td:nth-child(2) {
      position: sticky;
      left: 92px;
      z-index: 4;
      background: var(--surface);
      box-shadow: 1px 0 0 var(--line);
    }

    thead th:nth-child(2) {
      z-index: 9;
      background: var(--surface-muted);
    }

    tbody tr:hover td:first-child,
    tbody tr:hover td:nth-child(2) {
      background: #fcfcfd;
    }

    .img {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-m);
      border: 1px solid var(--line);
      background: var(--surface-muted);
      overflow: hidden;
      display: grid;
      place-items: center;
      color: var(--text-neutral);
      font-size: 11px;
      line-height: 15px;
      text-align: center;
      font-weight: 800;
    }

    .img-link {
      display: block;
      width: 72px;
      height: 72px;
      border-radius: var(--radius-m);
      outline: none;
    }

    .img-link:focus-visible {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.22);
    }

    .img-link:hover .img {
      border-color: #93c5fd;
    }

    .img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product strong {
      display: block;
      color: var(--text-strong);
      font-size: 14px;
      line-height: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .product span {
      display: block;
      color: var(--text-neutral);
      font-size: 12px;
      line-height: 17px;
    }

    .num {
      color: var(--text-strong);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .muted {
      color: var(--text-neutral);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .link-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: flex-start;
    }

    .channel-link {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: var(--link);
      padding: 4px 10px;
      font-size: 12px;
      line-height: 16px;
      font-weight: 800;
      white-space: nowrap;
    }

    .channel-link.official {
      border-color: var(--line);
      background: #fff;
      color: var(--text-strong);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text-normal);
      padding: 2px 8px;
      font-size: 11px;
      line-height: 16px;
      font-weight: 700;
    }

    .tag.sale { color: var(--sale); border-color: #ffd6c8; background: #fff3f0; }
    .tag.good { color: var(--success); border-color: #bbf7d0; background: #dcfce7; }
    .tag.warn { color: var(--warning-text); border-color: #fef9c3; background: var(--warning-bg); }
    .tag.danger { color: var(--danger-text); border-color: #ffd6c8; background: var(--danger-bg); }
    .tag.info { color: #1d4ed8; border-color: #bfdbfe; background: #eff6ff; }
    .tag.category { color: #334155; border-color: #dbeafe; background: #eff6ff; }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 32px;
      border-radius: 12px;
      background: #eff6ff;
      color: var(--link);
      font-size: 14px;
      line-height: 18px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover { text-decoration: underline; }

    details {
      border: 1px solid var(--line);
      border-radius: var(--radius-m);
      background: var(--surface-muted);
      padding: 8px 10px;
    }

    summary {
      cursor: pointer;
      color: var(--text-strong);
      font-weight: 800;
      font-size: 12px;
      line-height: 17px;
    }

    .detail-grid {
      margin-top: 8px;
      display: grid;
      gap: 8px;
    }

    .detail-block {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-s);
      padding: 8px;
    }

    .detail-block b {
      display: block;
      color: var(--text-strong);
      margin-bottom: 3px;
      font-size: 12px;
      line-height: 17px;
    }

    .detail-block p {
      margin: 0;
      color: var(--text-normal);
      font-size: 12px;
      line-height: 18px;
    }

    .ingredient-panel {
      display: grid;
      gap: 8px;
    }

    .ingredient-panel > p {
      margin: 0;
    }

    .ingredient-toggle {
      border: 1px solid var(--line);
      border-radius: var(--radius-s);
      background: #f8fafc;
      padding: 8px 10px;
    }

    .ingredient-toggle summary {
      cursor: pointer;
      color: var(--text-strong);
      font-weight: 800;
    }

    .ingredient-copy {
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: anywhere;
      color: var(--text-normal);
      font-size: 12px;
      line-height: 19px;
    }

    .ingredient-source {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 16px;
    }

    .clinical {
      display: grid;
      gap: 8px;
    }

    .clinical p {
      margin: 0;
    }

    .clinical b {
      color: var(--text-strong);
      font-weight: 800;
    }

    .clinical ul,
    .clinical ol {
      margin: 0;
      padding-left: 18px;
    }

    .clinical li + li {
      margin-top: 4px;
    }

    .clinical details {
      margin-top: 2px;
    }

    .clinical-test {
      padding: 8px 0;
      border-top: 1px solid var(--line);
    }

    .clinical-test:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .clinical-test strong {
      display: block;
      margin-bottom: 5px;
      color: var(--text-strong);
    }

    .clinical-meta {
      display: grid;
      gap: 3px;
      color: var(--text-normal);
      font-size: 12px;
      line-height: 18px;
    }

    .footer {
      margin-top: 18px;
      color: var(--text-neutral);
      font-size: 12px;
      line-height: 18px;
    }

    @media (max-width: 430px) {
      body { min-width: 0; }
      .app { min-width: 0; }
      .top-inner, .summary, .controls, .content { padding-left: 16px; padding-right: 16px; }
      h1 { font-size: 22px; line-height: 31px; }
      .summary { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      table { min-width: 1800px; }
      .table-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="top-inner">
        <div class="eyebrow">오롯헤어 사업계획서 8~12페이지 기반 · 2026.07.07 리서치</div>
        <h1>국내 극손상모 고객이 실제 비교하는 헤어케어 상품</h1>
      </div>
    </header>

    <section class="summary" aria-label="요약 지표">
      <div class="metric"><span>분석 상품</span><strong id="metricCount">15개</strong></div>
      <div class="metric"><span>wash-off</span><strong id="metricWash">0개</strong></div>
      <div class="metric"><span>leave-in</span><strong id="metricLeave">0개</strong></div>
      <div class="metric"><span>실리콘/유사 성분 확인</span><strong id="metricSilicone">0개</strong></div>
      <div class="metric"><span>평균 100ml/g당</span><strong id="metricAvg">0원</strong></div>
    </section>

    <section class="controls" aria-label="검색과 필터">
      <input class="search" id="search" placeholder="브랜드, 제품명, 성분, 인식 키워드로 검색" />
      <select class="select" id="typeFilter">
        <option value="">전체 타입</option>
        <option value="wash-off">wash-off</option>
        <option value="leave-in">leave-in</option>
      </select>
      <select class="select" id="categoryFilter">
        <option value="">세부카테고리 전체</option>
        <option value="프리샴푸">프리샴푸</option>
        <option value="샴푸">샴푸</option>
        <option value="컨디셔너·린스">컨디셔너·린스</option>
        <option value="트리트먼트·헤어팩">트리트먼트·헤어팩</option>
        <option value="워터 트리트먼트">워터 트리트먼트</option>
        <option value="헤어 에센스·밀크·앰플">헤어 에센스·밀크·앰플</option>
        <option value="헤어 미스트">헤어 미스트</option>
        <option value="헤어 오일">헤어 오일</option>
      </select>
      <select class="select" id="siliconeFilter">
        <option value="">실리콘 전체</option>
        <option value="yes">실리콘 있음</option>
        <option value="similar">실리콘 유사성분 있음</option>
        <option value="no">실리콘 없음</option>
        <option value="unknown">확인 필요</option>
      </select>
      <button class="btn" id="reset">필터 초기화</button>
      <button class="btn secondary" id="saveColumns" type="button">칼럼 순서 저장</button>
      <button class="btn secondary" id="resetColumns" type="button">칼럼 순서 초기화</button>
    </section>

    <main class="content">
      <div class="table-wrap">
        <table>
          <thead>
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <p class="footer">
        금액은 2026.07.07 현재 검색·공식/유통 페이지에서 확인된 기준입니다. 행사가는 채널과 날짜에 따라 달라질 수 있어, 아티팩트에는 확인 채널과 검증 상태를 함께 남겼습니다.
      </p>
    </main>
  </div>

  <script>
    const products = [
      {
        image: "assets/orot-hair-products/tsubaki.jpg",
        brand: "츠바키",
        name: "프리미엄 EX 리페어 마스크 180g",

        perception: "올리브영·시코르 등에서 접근성이 높은 일본계 헤어팩으로, ‘즉각 부드러움’과 향 지속력 이미지가 강합니다. 극손상모가 피노·마블 헤어팩과 함께 비교하는 대중형 고영양 마스크입니다.",

        negative: "짧게 방치하면 린스와 큰 차이를 못 느낀다는 의견이 있고, 단지형이라 손으로 퍼야 하는 점을 번거롭게 봅니다. 모발 상태에 따라 초반에는 좋다가 장기 사용 시 효과가 둔해졌다는 반응, 180g 용량이 아쉽다는 반응도 보입니다.",

        manufacturer: "파인투데이",
        seller: "파인투데이코리아㈜",
        siliconeStatus: "yes",
        silicone: "다이메티콘 확인. 검색 스니펫 기준이며 상세 전성분 재확인이 필요합니다.",
        functionRead: "실리콘 컨디셔닝막 + 보습/아미노산계 성분으로 엉킴 완화, 윤기, 즉각적 매끄러움에 초점이 있습니다.",
        achievement: "올리브영 상품명에서 ‘올영1등 헤어팩’으로 노출됩니다. 글로우픽에서는 2024 글로우픽 어워드 선정 및 어워드 8회 수상 이력이 확인됩니다.",

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function ingredientContent(product) {
      const key = product.clinicalKey || product.brand;
      const ingredient = product.ingredients ? { source: product.ingredientsSource || "제품 상세", text: product.ingredients } : ingredientTextByKey[key] || ingredientTextByKey[product.brand];
      if (ingredient?.text) return ingredient;
      const checkedParts = [
        product.silicone && `실리콘/유사 성분 메모: ${product.silicone}`,
        product.confidence && `검증 메모: ${product.confidence}`
      ].filter(Boolean).join("\n\n");
      return {
        source: "전성분 원문 미확보",
        complete: false,
        text: `전성분 전체 원문 확인 필요.\n\n현재 확보된 성분 단서:\n${checkedParts || "현재 확인된 성분 단서 없음."}`
      };
    }

      return `
        <div class="ingredient-panel">
          <p>${escapeHtml(product.functionRead)}</p>

            <div class="ingredient-copy">${escapeHtml(ingredient.text)}</div>

    }

      if (product.brand === "클로란") return "샴푸";
      if (product.type === "wash-off" && product.name.includes("워터") && product.name.includes("트리트먼트")) return "워터 트리트먼트";
      if (["모레모", "씨드비", "리필드"].includes(product.brand) && product.name.includes("트리트먼트")) return "워터 트리트먼트";
      if (product.brand === "비프로젝트") return "워터 트리트먼트";
      if (product.brand === "츠바키" && product.name.includes("트리트먼트 워터")) return "헤어 미스트";

      if (product.brand === "실크테라피") return "헤어 오일";
      if (product.type === "leave-in") return "헤어 에센스·밀크·앰플";
      return "트리트먼트·헤어팩";

    function clinical(product) {
      const data = clinicalData[product.clinicalKey || product.brand] || {
        status: "unknown",
        center: "확인 필요",
        items: ["상세페이지 추가 확인 필요"],
        details: [{ title: "확인 필요", note: product.clinical }]
      };
      const isNone = data.status === "none";
      const isUnknown = data.status === "unknown";
      const isFunctional = data.status === "functional";
      const statusClass = isNone || isUnknown || isFunctional ? "warn" : "good";
      const statusText = isNone || isFunctional ? "임상 없음" : isUnknown ? "확인 필요" : "임상 있음";
      const extraStatus = isFunctional ? ' <span class="tag good">기능성 인증</span>' : "";
      const itemLabel = isNone || isUnknown ? "확인한 정보" : isFunctional ? "기능성/제품 정보" : "임상항목";
      const itemList = data.items.map(item => `<li>${item}</li>`).join("");
      const patentSection = data.patents?.length ? `
          <p><b>[특허·기술]</b> 총 ${data.patents.length}개</p>
          <ul>${data.patents.map(item => `<li><b>${item.title}</b>${item.note ? `: ${item.note}` : ""}</li>`).join("")}</ul>
        ` : "";
      const details = data.details.map((test, index) => {
        const meta = [
          test.period && `<div><b>[연구기간]</b> ${test.period}</div>`,
          test.target && `<div><b>[대상]</b> ${test.target}</div>`,
          test.count && `<div><b>[인원]</b> ${test.count}</div>`,
          test.note && `<div><b>[메모]</b> ${test.note}</div>`
        ].filter(Boolean).join("");
        return `<div class="clinical-test"><strong>${index + 1}. ${test.title}</strong><div class="clinical-meta">${meta}</div></div>`;
      }).join("");
      return `
        <div class="clinical">
          <p><b>[임상 여부]</b> <span class="tag ${statusClass}">${statusText}</span>${extraStatus}</p>
          <p><b>[임상센터]</b> ${data.center}</p>
          <p><b>[${itemLabel}]</b> 총 ${data.items.length}개</p>
          <ul>${itemList}</ul>
          ${patentSection}
          <details>
            <summary>상세 내용</summary>
            <div class="detail-grid">${details}</div>
          </details>
        </div>
      `;
    }

      { id: "volumeValue", label: "용량", width: 110, sortKey: "volumeValue", render: product => `<span class="num">${product.volume}</span>` },
      { id: "per100", label: "100ml/g당", width: 128, sortKey: "per100", render: product => `<span class="num">${won(product.per100)}</span>` },
      { id: "type", label: "타입", width: 96, render: product => `<span class="tag ${product.type === "wash-off" ? "good" : "sale"}">${product.type}</span>` },
      { id: "subCategory", label: "세부카테고리", width: 170, render: product => `<span class="tag category">${subCategory(product)}</span>` },
      { id: "links", label: "판매 채널", width: 150, render: product => linkList(product) },
      { id: "perception", label: "사람들에게 어떻게 인식되는지", width: 250, render: product => product.perception },
      { id: "review", label: "리뷰 분석", width: 300, render: product => detail(product) },
      { id: "clinical", label: "임상 관련", width: 280, render: product => clinical(product) },
      { id: "manufacturer", label: "제조사", width: 190, render: product => product.manufacturer },
      { id: "seller", label: "책임판매업자", width: 190, render: product => product.seller },
      { id: "silicone", label: "실리콘/유사 성분", width: 210, render: product => `<div class="tag-list">${siliconeLabel(product.siliconeStatus)}<span>${product.silicone}</span></div>` },
      { id: "functionRead", label: "전성분 기반 기능 해석", width: 320, render: product => functionRead(product) },
      { id: "achievement", label: "성과·샤라웃", width: 250, render: product => product.achievement },
      { id: "model", label: "현재 광고모델", width: 170, render: product => product.model },
      { id: "confidence", label: "검증 메모", width: 190, render: product => product.confidence }
    ];
    const fixedColumns = columns.filter(column => column.locked);
    const movableColumns = columns.filter(column => !column.locked);
    const columnMap = Object.fromEntries(columns.map(column => [column.id, column]));
    const defaultColumnOrder = movableColumns.map(column => column.id);
    let columnOrder = loadColumnOrder();
    let draggedColumnId = null;
    let columnDragMoved = false;
    let pointerDrag = null;

    function loadColumnOrder() {
      try {
        const stored = JSON.parse(localStorage.getItem(columnStorageKey) || "[]");
        const valid = stored.filter(id => defaultColumnOrder.includes(id));
        const missing = defaultColumnOrder.filter(id => !valid.includes(id));
        return [...valid, ...missing];
      } catch {
        return [...defaultColumnOrder];
      }
    }

    function orderedColumns() {
      return [...fixedColumns, ...columnOrder.map(id => columnMap[id]).filter(Boolean)];
    }

    function saveColumnOrder() {
      localStorage.setItem(columnStorageKey, JSON.stringify(columnOrder));
    }

    function resetColumnOrder() {
      columnOrder = [...defaultColumnOrder];
      localStorage.removeItem(columnStorageKey);
      renderHeader();
      render();
    }

    function moveColumn(sourceId, targetId) {
      if (!sourceId || !targetId || sourceId === targetId) return;
      const from = columnOrder.indexOf(sourceId);
      const to = columnOrder.indexOf(targetId);
      if (from < 0 || to < 0) return;
      const next = [...columnOrder];
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      columnOrder = next;
      renderHeader();
      render();
    }

    function bindHeaderEvents() {
      headerRow.querySelectorAll("th.draggable-col").forEach(th => {
        th.addEventListener("dragstart", event => {
          draggedColumnId = th.dataset.colId;
          columnDragMoved = false;
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", draggedColumnId);
          th.classList.add("dragging");
        });

        th.addEventListener("dragenter", () => {
          if (draggedColumnId && draggedColumnId !== th.dataset.colId) th.classList.add("drop-target");
        });

        th.addEventListener("dragover", event => {
          event.preventDefault();
          columnDragMoved = true;
          event.dataTransfer.dropEffect = "move";
        });

        th.addEventListener("dragleave", () => th.classList.remove("drop-target"));

        th.addEventListener("drop", event => {
          event.preventDefault();
          th.classList.remove("drop-target");
          moveColumn(draggedColumnId || event.dataTransfer.getData("text/plain"), th.dataset.colId);
        });

        th.addEventListener("dragend", () => {
          draggedColumnId = null;
          headerRow.querySelectorAll("th").forEach(node => node.classList.remove("dragging", "drop-target"));
        });

        th.addEventListener("pointerdown", event => {
          if (event.button !== 0) return;
          pointerDrag = {
            id: th.dataset.colId,
            startX: event.clientX,
            startY: event.clientY,
            moved: false
          };
          th.setPointerCapture(event.pointerId);
        });

        th.addEventListener("pointermove", event => {
          if (!pointerDrag || pointerDrag.id !== th.dataset.colId) return;
          const dx = Math.abs(event.clientX - pointerDrag.startX);
          const dy = Math.abs(event.clientY - pointerDrag.startY);
          if (dx < 8 && dy < 8) return;
          pointerDrag.moved = true;
          columnDragMoved = true;
          headerRow.querySelectorAll("th").forEach(node => node.classList.remove("dragging", "drop-target"));
          th.classList.add("dragging");
          const target = document.elementFromPoint(event.clientX, event.clientY)?.closest("th.draggable-col");
          if (target && target.dataset.colId !== pointerDrag.id) target.classList.add("drop-target");
        });

        th.addEventListener("pointerup", event => {
          if (!pointerDrag || pointerDrag.id !== th.dataset.colId) return;
          const target = document.elementFromPoint(event.clientX, event.clientY)?.closest("th.draggable-col");
          const sourceId = pointerDrag.id;
          const moved = pointerDrag.moved;
          pointerDrag = null;
          headerRow.querySelectorAll("th").forEach(node => node.classList.remove("dragging", "drop-target"));
          if (moved && target) moveColumn(sourceId, target.dataset.colId);
        });

        th.addEventListener("mousedown", event => {
          if (event.button !== 0) return;
          pointerDrag = {
            id: th.dataset.colId,
            startX: event.clientX,
            startY: event.clientY,
            moved: false
          };
          event.preventDefault();
        });
      });

      headerRow.querySelectorAll("th.sortable").forEach(th => {
        th.addEventListener("click", () => {
          if (columnDragMoved) {
            columnDragMoved = false;
            return;
          }
          const key = th.dataset.key;
          sort = sort.key === key ? { key, dir: sort.dir === "asc" ? "desc" : "asc" } : { key, dir: "asc" };
          renderHeader();
          render();
        });
      });
    }

    function renderHeader() {
      headerRow.innerHTML = orderedColumns().map(column => {
        const sortable = column.sortKey ? " sortable" : "";
        const draggable = column.locked ? "" : " draggable-col";
        const active = column.sortKey === sort.key ? ` active ${sort.dir}` : "";
        const dataKey = column.sortKey ? ` data-key="${column.sortKey}"` : "";
        const draggableAttr = column.locked ? "" : ' title="드래그해서 칼럼 순서 변경"';
        return `<th class="${`${sortable}${draggable}${active}`.trim()}" data-col-id="${column.id}"${dataKey}${draggableAttr} style="width:${column.width}px">${column.label}</th>`;
      }).join("");
      bindHeaderEvents();
    }

    document.addEventListener("mousemove", event => {
      if (!pointerDrag) return;
      const dx = Math.abs(event.clientX - pointerDrag.startX);
      const dy = Math.abs(event.clientY - pointerDrag.startY);
      if (dx < 8 && dy < 8) return;
      pointerDrag.moved = true;
      columnDragMoved = true;
      headerRow.querySelectorAll("th").forEach(node => node.classList.remove("dragging", "drop-target"));
      headerRow.querySelector(`th[data-col-id="${pointerDrag.id}"]`)?.classList.add("dragging");
      const target = document.elementFromPoint(event.clientX, event.clientY)?.closest("th.draggable-col");
      if (target && target.dataset.colId !== pointerDrag.id) target.classList.add("drop-target");
    });

    document.addEventListener("mouseup", event => {
      if (!pointerDrag) return;
      const sourceId = pointerDrag.id;
      const moved = pointerDrag.moved;
      pointerDrag = null;
      const target = document.elementFromPoint(event.clientX, event.clientY)?.closest("th.draggable-col");
      headerRow.querySelectorAll("th").forEach(node => node.classList.remove("dragging", "drop-target"));
      if (moved && target) moveColumn(sourceId, target.dataset.colId);
    });

    function render() {
      const q = search.value.trim().toLowerCase();
      const type = typeFilter.value;
      const category = categoryFilter.value;
      const silicone = siliconeFilter.value;
      let rows = products.filter(product => {
        const haystack = [
          product.brand, product.name, product.slideName, subCategory(product), product.perception,
          product.positive, product.negative, product.silicone, product.functionRead,
          product.achievement, product.model, product.confidence
        ].join(" ").toLowerCase();
        return (!q || haystack.includes(q))
          && (!type || product.type === type)
          && (!category || subCategory(product) === category)
          && (!silicone || product.siliconeStatus === silicone);
      });

      rows = rows.sort((a, b) => {
        const av = Number.isFinite(a[sort.key]) ? a[sort.key] : Number.POSITIVE_INFINITY;
        const bv = Number.isFinite(b[sort.key]) ? b[sort.key] : Number.POSITIVE_INFINITY;
        const result = av === bv ? a.brand.localeCompare(b.brand, "ko") : av - bv;
        return sort.dir === "asc" ? result : -result;
      });

      const visibleColumns = orderedColumns();
      tbody.innerHTML = rows.map(product => `
        <tr>
          ${visibleColumns.map(column => `<td${column.cellClass ? ` class="${column.cellClass}"` : ""}>${column.render(product)}</td>`).join("")}
        </tr>
      `).join("");
    }

    function updateMetrics() {
      const wash = products.filter(p => p.type === "wash-off").length;
      const leave = products.filter(p => p.type === "leave-in").length;
      const silicone = products.filter(p => p.siliconeStatus === "yes" || p.siliconeStatus === "similar").length;
      const avg = Math.round(products.reduce((sum, p) => sum + p.per100, 0) / products.length);
      document.getElementById("metricCount").textContent = `${products.length}개`;
      document.getElementById("metricWash").textContent = `${wash}개`;
      document.getElementById("metricLeave").textContent = `${leave}개`;
      document.getElementById("metricSilicone").textContent = `${silicone}개`;
      document.getElementById("metricAvg").textContent = won(avg);
    }

    [search, typeFilter, categoryFilter, siliconeFilter].forEach(el => el.addEventListener("input", render));
    reset.addEventListener("click", () => {
      search.value = "";
      typeFilter.value = "";
      categoryFilter.value = "";
      siliconeFilter.value = "";
      render();
    });

    saveColumns.addEventListener("click", () => {
      saveColumnOrder();
      const label = saveColumns.textContent;
      saveColumns.textContent = "저장됨";
      window.setTimeout(() => {
        saveColumns.textContent = label;
      }, 1200);
    });

    resetColumns.addEventListener("click", resetColumnOrder);

    updateMetrics();
    renderHeader();
    render();
  </script>
</body>
</html>
